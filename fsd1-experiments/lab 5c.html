<!DOCTYPE html>
<html>
<head>
<title>CSS Font and Text Example</title>

<style>

/* font-size */
.size{
font-size:40px;
}

/* font-weight */
.weight{
font-weight:bolder;
}

/* font-style */
.style{
font-style:oblique;
}

/* text-decoration */
.decoration{
text-decoration:solid;
}

/* text-transform */
.transform{
text-transform:uppercase;
}

/* text-align */
.align{
text-align:center;
}

</style>

</head>

<body>

<p class="size">srihari is a good boy.</p>

<p class="weight">rishi is a clower boy.</p>

<p class="style">venkat is a thin boy.</p>

<p class="decoration">rakesh is a handsome boy.</p>

<p class="transform">barath is a hardworker.</p>

<p class="align">kaja is funny boy.</p>

</body>
</html>
