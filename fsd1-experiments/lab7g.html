<html> 
<head> 
    <title>Date Object Example</title> 
    <script>         function showDateTime() {             let now = new Date();             document.getElementById("output").innerText = "Current Date and Time: " + now; 
        } 
    </script> 
</head> 
<body> 
    <button onclick="showDateTime()">Show Date & Time</button> 
    <p id="output"></p> 
</body> 
</html>
