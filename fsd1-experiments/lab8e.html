<body>
   <h2>lab 8e experiment</h2> 
   <script>
    let n=Number(prompt("enter number"));
    let temp=n,sum=0;
    while(temp>0){
        let r=temp%10;
        sum +=r*r*r;
        temp=Math.floor(temp/10);
    }
    alert(sum==n ? "Armstrong": "Not Armstrong");
   </script>
</body>
