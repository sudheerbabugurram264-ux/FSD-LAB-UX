<html> 
<head> 
    <script> 
        function manipulateString() { 
            let str = " Hello JavaScript "; 
            let trimmed = str.trim(); 
            let upper = str.toUpperCase(); 
            document.getElementById("output").innerText = `Trimmed: ${trimmed}, Uppercase: 
${upper}`; 
        } 
    </script> 
</head> 
<body> 
    <button onclick="manipulateString()">Show String Operations</button> 
    <p id="output"></p> 
</body> 
</html>
