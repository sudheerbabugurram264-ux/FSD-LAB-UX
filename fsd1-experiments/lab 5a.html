<!DOCTYPE html>
<html>
<head>
<title>CSS Color Reference</title>

<style>

/* Color Name */
.name{
color:blue;
}
/* HEX value */
.hex{
color: #de7171;
}

/* RGB value */
.rgb{
color: rgb(150,98,300);
}

/* RGBA value */
.rgba{
color: rgba(40,90,50,0.9);
}

/* HSL value */
.hsl{
color: hsl(200,70%,40%);
}

</style>
</head>

<body>

<h2 class="name">srihari is a good boy</h2>
<h2 class="hex">rishi is a clower boy</h2>
<h2 class="rgb">venkat is a thin boy</h2>
<h2 class="rgba">rakesh is a handsome boy</h2>
<h2 class="hsl">barath is a hardworker</h2>
</body>
</html>
